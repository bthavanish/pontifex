name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APKs
        run: ./gradlew assembleDebug

      - name: Generate version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          GIT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +%Y%m%d)
          echo "version=${VERSION_NAME}-nightly-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "git_sha=${GIT_SHA}" >> $GITHUB_OUTPUT

      - name: Upload Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: pontifex-nightly-${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ steps.version.outputs.version }}
          name: "Nightly ${{ steps.version.outputs.version }}"
          body: |
            ## Pontifex Nightly Build

            **Version:** ${{ steps.version.outputs.version }}
            **Git SHA:** ${{ steps.version.outputs.git_sha }}
            **Built:** ${{ github.event.head_commit.message || 'Nightly build' }}

            This is an automated nightly build from the main branch. It may be unstable.
          files: app/build/outputs/apk/debug/*.apk
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
